<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="normalize.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/sass/style.css">
  <title>Morojko</title>
</head>
<body>
<header class="header container">
  <h1 class="header__title fw-bold">Мороженное</h1>
</header>
<main class="container">
  <section class="cream-shop">
    <table class="cream-shop-table table table-hover">
      <thead>
      <tr class="cream-shop-table__title">
        <th scope="col">#</th>
        <th scope="col">Наименование</th>
        <th scope="col">Производитель</th>
        <th scope="col">Категория</th>
        <th scope="col">Цена</th>
      </tr>
      </thead>
      <tbody class="table-list">

      </tbody>
    </table>
    <form class="edit-form">
      <input class="edit-form__id form-control" type="number" name="id" readonly>
      <input class="edit-form__name form-control" type="text" name="name">
      <input class="edit-form__manufacturer form-control" type="text" name="manufacturer">
      <select class="edit-form__category form-control" type="number" name="category_id">
        <option value="1">Шоколадное</option>
        <option value="2">Сливочное</option>
      </select>
      <input class="edit-form__price form-control" type="number" name="price" placeholder="Цена">
      <button class="edit-form__button-edit btn btn-primary" type="submit">Изменить</button>
    </form>
  </section>
</main>
<footer class="footer container">
  <h3 class="footer__title fw-bold">Добавить товар</h3>
  <form class="form">
    <input class="form-control" type="text" name="name" placeholder="Наименование">
    <input class="form-control" type="text" name="manufacturer" placeholder="Производитель">
    <select class="form-category__test form-control" type="number" name="category_id">

    </select>
    <input class="form-control" type="number" name="price" placeholder="Цена">
    <button class="btn btn-primary" type="submit">Добавить</button>
  </form>
  <h3 class="footer__title fw-bold">Категории</h3>
  <form class="form-category">
    <input class="form-category__input form-control" type="text" name="name" placeholder="Наименование">
    <button class="form-category__add btn btn-primary" type="submit">Добавить</button>
    <select class="form-category__list form-control" type="number" name="category_id">

    </select>
    <button class="btn btn-danger" type="submit">Удалить</button>
    <button class="btn btn-primary" type="submit">Редак</button>
  </form>
</footer>
<script type="module" src="index.js"></script>
</body>
</html>
