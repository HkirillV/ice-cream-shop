<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="normalize.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/sass/style.css">
  <title>Мороженное</title>
</head>
<body>
<header class="header container">
  <h1 class="header__title fw-bold">Мороженное</h1>
</header>
<main class="container">
  <section class="cream-shop">
    <div class="table-headers">
      <div class="name">
        <div class="name__number fw-bold h6">#</div>
        <div class="name__title fw-bold h6">Название</div>
      </div>
      <div class="name">
        <div class="name__quantity fw-bold h6">Кол-во</div>
        <div class="name__date fw-bold h6">Годен до</div>
      </div>
    </div>
    <div class="cream-shop-list">

    </div>
    <form class="edit-form">
      <input class="form-control" type="text" name="title">
      <input class="form-control" type="number" name="count">
      <input class="form-control" type="date" name="date">
      <button class="btn btn-primary" type="submit">Изменить</button>
    </form>
  </section>
</main>
<footer class="footer container">
  <h3 class="footer__title fw-bold">Добавить товар</h3>
  <form class="form">
    <input class="form-control" type="text" name="title" placeholder="Название">
    <input class="form-control" type="number" name="count" placeholder="Кол-во">
    <input class="form-control" type="date" name="date">
    <button class="btn btn-primary" type="submit">Добавить</button>
  </form>
</footer>
<script type="module" src="index.js"></script>
</body>
</html>
